
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W. Bryan Smith Photography</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: rgb(75, 122, 255);
            font-family: Arial, sans-serif;
        }
        #main-image-container {
            width: 100%;
            height: calc(100vh - 120px);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #main-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        #filmstrip {
            height: 100px;
            display: flex;
            overflow-x: auto;
            background-color: #333;
            padding: 10px 0;
        }
        .thumbnail {
            height: 80px;
            margin: 0 5px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.3s ease;
        }
        .thumbnail.active {
            border-color: rgb(75, 122, 255);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aws-amplify/4.3.4/aws-amplify.min.js"></script>
    <script src="https://unpkg.com/panzoom@8.7.3/dist/panzoom.min.js"></script>
</head>
<body>
    <div id="main-image-container">
        <img id="main-image" src="" alt="Main Image">
    </div>
    <div id="filmstrip"></div>

    <script>
        //const { Amplify } = aws-amplify;

        // Amplify configuration
        Amplify.configure({
            Auth: {
                identityPoolId: 'us-west-1:9e08878d-ca32-436e-b383-1af42a66a80d',
                region: 'us-west-1',
            },
            Storage: {
                bucket: 'wbryansmith.org',
                region: 'us-west-1'
            }
        });

        // Your existing JavaScript code here
        const mainImage = document.getElementById('main-image');
        const filmstrip = document.getElementById('filmstrip');
        const mainImageContainer = document.getElementById('main-image-container');

        let panzoomInstance;
        let images = [];

        async function listImages() {
            try {
                const result = await Amplify.Storage.list('full_imgs/', { level: 'public' });
                console.log('List result:', result);
                return result.map(item => item.key).filter(key => key !== 'full_imgs/');
            } catch (error) {
                console.error("Error listing images:", error);
                return [];
            }
        }

        async function loadImages() {
            try {
                images = await listImages();
                for (let [index, src] of images.entries()) {
                    const thumbnail = document.createElement('img');
                    const result = await Amplify.Storage.get(src, { level: 'public' });
                    thumbnail.src = result;
                    thumbnail.alt = `Thumbnail ${index + 1}`;
                    thumbnail.className = 'thumbnail';
                    thumbnail.addEventListener('click', () => selectImage(index));
                    filmstrip.appendChild(thumbnail);
                }
                if (images.length > 0) {
                    selectImage(0);
                }
            } catch (error) {
                console.error("Error loading images:", error);
            }
        }

        async function selectImage(index) {
            try {
                const result = await Amplify.Storage.get(images[index], { level: 'public' });
                mainImage.src = result;
                document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                    thumb.classList.toggle('active', i === index);
                });

                if (panzoomInstance) {
                    panzoomInstance.destroy();
                }

                panzoomInstance = Panzoom(mainImage, {
                    maxScale: 5,
                    minScale: 1,
                    contain: 'outside',
                    startScale: 1,
                    startX: 0,
                    startY: 0
                });

                mainImageContainer.addEventListener('wheel', panzoomInstance.zoomWithWheel);
            } catch (error) {
                console.error("Error selecting image:", error);
            }
        }

        // Initialize the image loading
        loadImages();
    </script>
</body>
</html>
