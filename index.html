<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W. Bryan Smith Photography</title>
    <style>
        /* Your existing CSS styles here */
    </style>
    <!-- Include the AWS SDK -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1011.0.min.js"></script>
</head>
<body>
    <div id="main-image-container">
        <img id="main-image" src="" alt="Main Image">
    </div>
    <div id="filmstrip"></div>

    <script src="https://unpkg.com/@panzoom/panzoom@4.5.1/dist/panzoom.min.js"></script>
    <script>
        // AWS Configuration
        AWS.config.region = 'us-west-1'; // e.g., 'us-west-2'
        AWS.config.credentials = new AWS.CognitoIdentityCredentials({
            IdentityPoolId: 'us-west-1:9e08878d-ca32-436e-b383-1af42a66a80d',
        });

        const albumBucketName = 'wbryansmith.org';
        const albumPrefix = 'full_imgs/';
        const s3 = new AWS.S3({
            apiVersion: '2006-03-01',
            params: { Bucket: albumBucketName }
        });

        const mainImage = document.getElementById('main-image');
        const filmstrip = document.getElementById('filmstrip');
        const mainImageContainer = document.getElementById('main-image-container');

        let panzoomInstance;
        let images = [];

        function listImages() {
            return new Promise((resolve, reject) => {
                s3.listObjects({ Prefix: albumPrefix }, function(err, data) {
                    if (err) {
                        reject("Error listing objects in bucket: " + err.message);
                    } else {
                        resolve(data.Contents.map(object => object.Key).filter(key => key !== albumPrefix));
                    }
                });
            });
        }

        async function loadImages() {
            try {
                images = await listImages();
                images.forEach((src, index) => {
                    const thumbnail = document.createElement('img');
                    thumbnail.src = s3.getSignedUrl('getObject', {Bucket: albumBucketName, Key: src});
                    thumbnail.alt = `Thumbnail ${index + 1}`;
                    thumbnail.className = 'thumbnail';
                    thumbnail.addEventListener('click', () => selectImage(index));
                    filmstrip.appendChild(thumbnail);
                });
                if (images.length > 0) {
                    selectImage(0);
                }
            } catch (error) {
                console.error("Error loading images:", error);
            }
        }

        function selectImage(index) {
            mainImage.src = s3.getSignedUrl('getObject', {Bucket: albumBucketName, Key: images[index]});
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });

            if (panzoomInstance) {
                panzoomInstance.destroy();
            }

            panzoomInstance = Panzoom(mainImage, {
                maxScale: 5,
                minScale: 1,
                contain: 'outside',
                startScale: 1,
                startX: 0,
                startY: 0
            });

            mainImageContainer.addEventListener('wheel', panzoomInstance.zoomWithWheel);
        }

        // Initialize the image loading
        loadImages();
    </script>
</body>
</html>
