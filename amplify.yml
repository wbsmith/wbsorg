version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env NODE_OPTIONS=--max-old-space-size=4096 npm run build
  artifacts:
    baseDirectory: .
    files:
      - 'dist/**/*'
      - 'node_modules/**/*'
  cache:
    paths:
      - node_modules/**/*